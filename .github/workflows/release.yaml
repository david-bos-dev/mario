name: Build and Release Windows
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Frontend
        run: bun run build:stable


      - name: Build Electrobun App
        run: bunx electrobun build --env=stable
      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/stable-win-x64/*.exe
            build/stable-win-x64/*.zst
            build/stable-win-x64/*.zip
            build/stable-win-x64/update.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Current Build
        uses: actions/cache/save@v4
        with:
          path: |
            build/stable-win-x64/
            artifacts/
          key: ${{ runner.os }}-electrobun-${{ github.sha }}