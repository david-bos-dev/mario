name: Build and Release Windows
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # 1. Build the frontend UI so Electrobun has something to bundle
      - name: Build
        run: bun run build:stable

      # 3. Upload everything to the GitHub Release
      # We check both the 'artifacts' folder (where Electrobun moves final files)
      # and the 'build' folder (just in case) to be absolutely bulletproof.
      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*.exe
            artifacts/*.zst
            artifacts/*.zip
            artifacts/*.patch
            artifacts/update.json
            build/stable-win-x64/*.exe
            build/stable-win-x64/*.zst
            build/stable-win-x64/*.zip
            build/stable-win-x64/*.patch
            build/stable-win-x64/update.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Cache the build output for faster subsequent runs
      - name: Cache Current Build
        uses: actions/cache/save@v4
        with:
          path: |
            build/stable-win-x64/
            artifacts/
          key: ${{ runner.os }}-electrobun-${{ github.sha }}